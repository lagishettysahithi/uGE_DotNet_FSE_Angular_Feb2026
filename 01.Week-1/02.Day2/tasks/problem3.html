<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h3>Student Registration Form </h3>
    <br>
    <form action="Register.php" method="post" autofocus autocomplete="ON">
        <fieldset>
            <legend>Student Details</legend>
            <label>UserName:</label>            
            <input type="text" id="uid" name="uid" autofocus placeholder="Enter user name" required/>
                    <br><br>

            <label>Email:</label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required/>
                     <br><br>

            <label>Phone No:</label>
            <input type="tel" id="phone" name="phone" placeholder="10-digit number" pattern="[0-9]{10}" required/>
                    <br><br>

            <label>Age:</label>
            <input type="number" id="age" name="age" min="10" max="50"  required/>
            <br><br>

            <label>Date:</label>
            <input type="date" id="d0b" name="dob"  required/>
            <br><br>
            <input type="submit" value="Register"/>
            <input type="reset" value="Clear"/>

        </fieldset>
    </form>
</body>
</html>
