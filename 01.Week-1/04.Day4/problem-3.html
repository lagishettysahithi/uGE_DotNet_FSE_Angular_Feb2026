<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Discount</title>
</head>
<body>
    <h1>Discount Calculator</h1>
</body>
<script>
    let amount=6000;
    discount=0;
    totalAmount=0;

    if(amount>=5000){
        discount=amount*0.20;
    }
    else if(amount>=3000){
        discount=amount*0.10;
    }
    else{
        discount=0;
    }

    totalAmount=amount-discount;

    console.log("Purchase Amount : " + amount + "<br>");
    console.log("Discount : " + discount );
    console.log("Total Amount : "+ totalAmount )
</script>

</html>
