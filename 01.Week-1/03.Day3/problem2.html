<!DOCTYPE html>
<html>
<head>
    <title>Personal Profile Card</title>

    <style>
        body {
            margin: 0;
            background-color: #f2f4f8;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content:flex-end;
            align-items:flex-start;
            height: 100vh;
        }

        .card {
            background-color: white;
            width: 300px;
            padding: 25px;
            border: 2px solid #333;
            border-radius: 12px;
            margin: 20px;
            text-align:left;
        }

        .card h1 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .role {
            font-size: 16px;
            font-weight: 600;
            color: #bb2323;
            margin-bottom: 15px;
        }

        .description {
            font-size: 14px;
            line-height: 1.6;
            color: #c23f7e;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #079072;
            color: white;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #004a99;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Sahithi</h1>
        <div class="role">Frontend Developer</div>
        <p class="description">
            Passionate about building clean and responsive web designs.
            I enjoy learning new technologies and improving my coding skills.
        </p>
        <button>Contact Me</button>
    </div>

</body>
</html>
